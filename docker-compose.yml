services:
  api:
    build: ./backend
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/${MONGO_DB}?authSource=admin
      DB_NAME: ${MONGO_DB}
    depends_on:
      - db
    expose:
      - "8000"
    networks:
      - backend

  db:
    image: mongo:latest
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - fazgom_mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://${DOMAIN_API}}
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-https://${DOMAIN_API}}
    restart: always
    env_file:
      - ./frontend/.env
    expose:
      - "3000"

  mongoexpress:
    image: mongo-express:latest
    restart: always
    env_file:
      - .env
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: db
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/${MONGO_DB}?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD}
    expose:
      - "8081"
    networks:
      - backend

volumes:
  fazgom_mongo_data:

networks:
  backend:
