services:
  api:
    build: ./backend
    restart: always
    dns:
    - 8.8.8.8
    - 1.1.1.1
    volumes:
    - ./backend:/app
    env_file:
    - ./backend/.env
    environment:
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/${MONGO_DB}?authSource=admin
      DB_NAME: ${MONGO_DB}
    depends_on:
    - db
    expose:
    - '8000'
    labels:
    - traefik.enable=true
    - traefik.http.routers.kaba-compta-api.rule=Host(`${DOMAIN_API}`) && (PathPrefix(`/api`)
      || PathPrefix(`/uploads`))
    - traefik.http.routers.kaba-compta-api.priority=100
    - traefik.http.routers.kaba-compta-api.entrypoints=websecure
    - traefik.http.routers.kaba-compta-api.tls.certresolver=myresolver
    - traefik.http.services.kaba-compta-api.loadbalancer.server.port=8000
    - traefik.docker.network=proxy_net
    networks:
    - backend
    - proxy_net
  db:
    image: mongo:latest
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
    - fazgom_mongo_data:/data/db
    networks:
    - backend
    healthcheck:
      test:
      - CMD
      - mongosh
      - --eval
      - db.adminCommand('ping')
      interval: 10s
      timeout: 5s
      retries: 5
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://${DOMAIN_API}}
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-https://${DOMAIN_API}}
    restart: always
    env_file:
    - ./frontend/.env
    expose:
    - '3000'
    labels:
    - traefik.enable=true
    - traefik.http.routers.kaba-compta-frontend.rule=Host(`${LANDING_DOMAIN_URL}`)
    - traefik.http.routers.kaba-compta-frontend.priority=1
    - traefik.http.routers.kaba-compta-frontend.entrypoints=websecure
    - traefik.http.routers.kaba-compta-frontend.tls.certresolver=myresolver
    - traefik.http.services.kaba-compta-frontend.loadbalancer.server.port=3000
    - traefik.docker.network=proxy_net
    networks:
    - proxy_net
  mongoexpress:
    image: mongo-express:latest
    restart: always
    env_file:
    - .env
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: db
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@db:27017/${MONGO_DB}?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD}
    expose:
    - '8081'
    labels:
    - traefik.enable=true
    - traefik.http.routers.kaba-compta-mongoexpress.rule=Host(`${DB_MANAGER_URL}`)
    - traefik.http.routers.kaba-compta-mongoexpress.entrypoints=websecure
    - traefik.http.routers.kaba-compta-mongoexpress.tls.certresolver=myresolver
    - traefik.http.services.kaba-compta-mongoexpress.loadbalancer.server.port=8081
    - traefik.docker.network=proxy_net
    networks:
    - backend
    - proxy_net
volumes:
  fazgom_mongo_data: null
networks:
  backend: null
  proxy_net:
    external: true
