services:

  # ─────────────────────────────────────────────
  # API FastAPI — Backend Fazgom
  # ─────────────────────────────────────────────
  fazgom_api:
    build: ./backend
    container_name: fazgom_api
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@fazgom_db:27017/${MONGO_DB}?authSource=admin
    depends_on:
      - fazgom_db
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fazgom_api.rule=Host(`${DOMAIN_API}`)"
      - "traefik.http.routers.fazgom_api.entrypoints=websecure"
      - "traefik.http.routers.fazgom_api.tls.certresolver=myresolver"
      - "traefik.http.services.fazgom_api.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy_net"
    networks:
      - proxy_net
      - fazgom_backend

  # ─────────────────────────────────────────────
  # MongoDB — Base de Données
  # ─────────────────────────────────────────────
  fazgom_db:
    image: mongo:latest
    container_name: fazgom_db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - fazgom_mongo_data:/data/db
    networks:
      - proxy_net
      - fazgom_backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Frontend — React Landing Page & Web App
  # ─────────────────────────────────────────────
  fazgom_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fazgom_frontend
    restart: always
    env_file:
      - ./frontend/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fazgom_frontend.rule=Host(`${LANDING_DOMAIN_URL}`)"
      - "traefik.http.routers.fazgom_frontend.entrypoints=websecure"
      - "traefik.http.routers.fazgom_frontend.tls.certresolver=myresolver"
      - "traefik.http.services.fazgom_frontend.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy_net"
    networks:
      - proxy_net

  # ─────────────────────────────────────────────
  # Mongo-Express — Interface de gestion MongoDB
  # ─────────────────────────────────────────────
  fazgom_mongoexpress:
    image: mongo-express:latest
    container_name: fazgom_mongoexpress
    restart: always
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: fazgom_db
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fazgom_mongoexpress.rule=Host(`${DB_MANAGER_URL}`)"
      - "traefik.http.routers.fazgom_mongoexpress.entrypoints=websecure"
      - "traefik.http.routers.fazgom_mongoexpress.tls.certresolver=myresolver"
      - "traefik.http.services.fazgom_mongoexpress.loadbalancer.server.port=8081"
      - "traefik.docker.network=proxy_net"
    networks:
      - proxy_net
      - fazgom_backend

volumes:
  fazgom_mongo_data:

networks:
  proxy_net:
    external: true
  fazgom_backend:
    name: fazgom_backend
