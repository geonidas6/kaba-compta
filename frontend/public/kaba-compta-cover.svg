<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 360" role="img" aria-label="Kaba-Compta">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F4E3D"/>
      <stop offset="0.55" stop-color="#2B654F"/>
      <stop offset="1" stop-color="#ECA869"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0v80" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0d2f24" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1440" height="360" fill="url(#bg)"/>
  <rect width="1440" height="360" fill="url(#grid)"/>
  <circle cx="1160" cy="70" r="190" fill="#ffffff" fill-opacity="0.10"/>
  <circle cx="1280" cy="250" r="140" fill="#ffffff" fill-opacity="0.08"/>
  <g filter="url(#shadow)">
    <rect x="80" y="96" width="118" height="118" rx="34" fill="#C84B31"/>
    <text x="139" y="171" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff">K</text>
  </g>
  <text x="230" y="150" font-family="Manrope, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff">Kaba-Compta</text>
  <text x="232" y="195" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" fill-opacity="0.82">Plateforme de mise en relation comptable marchand</text>
</svg>
